name = "sun-chun-portfolio"
compatibility_date = "2025-01-01"
pages_build_output_dir = "public"

# 生产环境的 KV / R2 / 密钥绑定在 Cloudflare Pages 控制台配置：
#   Settings → Functions → KV namespace bindings:   DATA  → (你的 namespace)
#   Settings → Functions → R2 bucket bindings:      IMAGES → sun-chun-images
#   Settings → Environment variables (Encrypted):   ADMIN_PASSWORD / SESSION_SECRET
#
# 本地开发通过 package.json 的 dev 脚本传参 + .dev.vars 文件处理
